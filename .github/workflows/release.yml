name: release

# Runs when a release is published.
# The workflow builds the binaries and latest.json, then attaches them to that release.
on:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: 1.3.14
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Validate
              run: bun run check
            - name: Build binaries and manifest
              env:
                  RELEASE_TAG: ${{ github.event.release.tag_name }}
              run: bun run scripts/build.ts "${RELEASE_TAG#v}"
            - name: Upload release assets
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release upload "${{ github.event.release.tag_name }}" \
                    dist/agent-linux-x64 \
                    dist/agent-windows-x64.exe \
                    dist/latest.json \
                    install.sh \
                    install.ps1 \
                    --clobber
