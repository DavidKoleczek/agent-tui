[alias]
lint   = "clippy --all-targets --all-features -- -D warnings"
format = "fmt --all -- --config imports_granularity=Module,group_imports=StdExternalCrate"
ci     = "fmt --all -- --check --config imports_granularity=Module,group_imports=StdExternalCrate"

# Statically link the MSVC C runtime on Windows so the .exe has no external runtime dependencies.
[target.'cfg(all(target_os = "windows", target_env = "msvc"))']
rustflags = ["-C", "target-feature=+crt-static"]
